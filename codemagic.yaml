workflows:
  android-native-build:
    name: Android Native (Kotlin) - WebView APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Generate debug keystore
        script: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore app/debug.keystore \
            -storepass android \
            -dname "CN=Debug, O=Debug, C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9999
      - name: Build release APK
        script: |
          gradle assembleRelease
    artifacts:
      - app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - alfredopjonas@gmail.com
        notify:
          success: true
          failure: true